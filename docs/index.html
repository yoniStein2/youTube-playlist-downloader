<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Playlist Downloader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .icon { font-size: 3rem; margin-bottom: 1.25rem; }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .status {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.75rem;
      font-size: 0.9rem;
      color: #aaa;
    }

    .status .os-label {
      font-weight: 600;
      color: #f1f1f1;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 0.85rem 1.5rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-primary {
      background: #ff0000;
      color: #fff;
      margin-bottom: 0.75rem;
    }

    .divider {
      color: #444;
      font-size: 0.8rem;
      margin: 1.25rem 0 1rem;
    }

    .other-links {
      display: flex;
      gap: 0.75rem;
    }

    .btn-secondary {
      flex: 1;
      background: #2a2a2a;
      color: #ccc;
      font-size: 0.85rem;
      padding: 0.65rem 1rem;
    }

    .instructions {
      margin-top: 1.75rem;
      text-align: left;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      font-size: 0.85rem;
      color: #888;
      line-height: 1.8;
    }

    .instructions b { color: #ccc; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎵</div>
    <h1>YouTube Playlist Downloader</h1>
    <p class="subtitle">Download any YouTube playlist as MP3 files — runs on your computer, no sign-up needed.</p>

    <div class="status">
      Detected: <span class="os-label" id="os-name">detecting...</span>
    </div>

    <a id="main-btn" class="btn btn-primary" href="#">⬇ Download for <span id="btn-os">your computer</span></a>

    <div class="divider">wrong platform?</div>
    <div class="other-links">
      <a class="btn btn-secondary" href="https://github.com/yoniStein2/youTube-playlist-downloader/releases/latest/download/YT-Downloader-Mac.zip">Mac (.zip)</a>
      <a class="btn btn-secondary" href="https://github.com/yoniStein2/youTube-playlist-downloader/releases/latest/download/YT-Downloader.bat">Windows (.bat)</a>
    </div>

    <div class="instructions" id="instructions"></div>
  </div>

  <script>
    const MAC_URL = 'https://github.com/yoniStein2/youTube-playlist-downloader/releases/latest/download/YT-Downloader-Mac.zip';
    const WIN_URL = 'https://github.com/yoniStein2/youTube-playlist-downloader/releases/latest/download/YT-Downloader.bat';

    const isWindows = navigator.userAgent.includes('Windows');
    const isMac     = navigator.userAgent.includes('Mac');

    const osName   = document.getElementById('os-name');
    const btnOs    = document.getElementById('btn-os');
    const mainBtn  = document.getElementById('main-btn');
    const instructions = document.getElementById('instructions');

    if (isWindows) {
      osName.textContent  = 'Windows';
      btnOs.textContent   = 'Windows';
      mainBtn.href        = WIN_URL;
      instructions.innerHTML = `
        <b>How to run:</b><br>
        1. Open your <b>Downloads</b> folder<br>
        2. Double-click <b>YT-Downloader.bat</b><br>
        3. If Windows warns you — click <b>More info → Run anyway</b><br>
        4. Your browser will open automatically
      `;
    } else if (isMac) {
      osName.textContent  = 'Mac';
      btnOs.textContent   = 'Mac';
      mainBtn.href        = MAC_URL;
      instructions.innerHTML = `
        <b>How to run:</b><br>
        1. Open your <b>Downloads</b> folder<br>
        2. Double-click <b>YT-Downloader-Mac.zip</b> to extract it<br>
        3. Double-click <b>YT-Downloader.command</b><br>
        4. If Mac blocks it — go to <b>System Settings → Privacy → Open Anyway</b><br>
        5. Your browser will open automatically
      `;
    } else {
      osName.textContent = 'Unknown OS';
      btnOs.textContent  = 'your computer';
      mainBtn.href       = MAC_URL;
      instructions.innerHTML = `
        Pick the right version above for your operating system.
      `;
    }

    // Auto-trigger download after a short delay
    if (isWindows || isMac) {
      setTimeout(() => { window.location.href = mainBtn.href; }, 800);
    }
  </script>
</body>
</html>
